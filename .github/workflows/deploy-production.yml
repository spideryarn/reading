name: Deploy to Production

on:
  push:
    branches: [main]
  # Allow manual trigger for emergency deployments
  workflow_dispatch:

jobs:
  deploy-database:
    name: Deploy Database Migrations
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy migrations to production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: blsgjlrezruxcfdyrqpk
        run: |
          # Link to production project
          npx supabase link --project-ref $SUPABASE_PROJECT_ID
          
          # Deploy migrations
          npx supabase db push --linked
          
          # Regenerate types for production (optional - helps catch type mismatches)
          npx supabase gen types typescript --linked > lib/types/database-production.ts
          
          echo "✅ Database migrations deployed successfully to production"

      - name: Notify on success
        if: success()
        run: |
          echo "🚀 Production database updated successfully"
          echo "Vercel will automatically deploy the application code"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Database migration failed"
          echo "Application deployment should be halted"
          exit 1